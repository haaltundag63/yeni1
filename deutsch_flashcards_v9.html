<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Deutsch Karten</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf7f4;--white:#fff;--b:rgba(0,0,0,.07);--bf:rgba(0,0,0,.04);--t:#1a1208;--td:rgba(26,18,8,.5);--tf:rgba(26,18,8,.35);}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Nunito',sans-serif;color:var(--t);display:flex;flex-direction:column;}

.hdr{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--white);border-bottom:1px solid var(--b);box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;background:linear-gradient(135deg,#f43f5e,#8b5cf6,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:9px;font-family:'Nunito',sans-serif;letter-spacing:2px;text-transform:uppercase;display:block;-webkit-text-fill-color:var(--tf);color:var(--tf);}
.ctr{font-size:11px;font-weight:700;color:#8b5cf6;background:rgba(139,92,246,.1);border:1.5px solid rgba(139,92,246,.25);padding:5px 12px;border-radius:20px;}

.topics{flex:0 0 auto;display:flex;gap:6px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--bf);}
.topics::-webkit-scrollbar{display:none;}
.tc{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;border:1.5px solid var(--b);color:var(--td);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;}
.tc.on{background:linear-gradient(135deg,#fce7f3,#ede9fe);border-color:rgba(139,92,246,.3);color:#7c3aed;}

.tbar{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(--white);border-bottom:1px solid var(--bf);overflow-x:auto;scrollbar-width:none;}
.tbar::-webkit-scrollbar{display:none;}
.tbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);white-space:nowrap;}
.tbtn{padding:4px 11px;border-radius:8px;font-size:10px;font-weight:700;border:1.5px solid var(--b);color:var(--td);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;}
.tbtn.on{background:linear-gradient(135deg,#fce7f3,#ede9fe);border-color:rgba(139,92,246,.3);color:#7c3aed;}

.prog{flex:0 0 4px;background:#f0e8ff;}
.prog-fill{height:4px;background:linear-gradient(90deg,#f43f5e,#8b5cf6,#0ea5e9);width:0;transition:width .5s ease;}

.stage{flex:1 1 0;min-height:0;display:flex;flex-direction:column;align-items:center;padding:12px 14px 10px;overflow:hidden;}

/* CARD — no CSS 3D, pure JS show/hide */
.cw{width:100%;max-width:480px;flex:1 1 0;min-height:0;max-height:460px;cursor:pointer;margin-bottom:12px;position:relative;}
.card-side{position:absolute;inset:0;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 28px rgba(0,0,0,.11),0 2px 6px rgba(0,0,0,.06);}
.card-side.hidden{display:none;}

/* ── FRONT ── */
.front{background:var(--white);}

/* SVG image — takes top 45% of card */
.img-wrap{flex:0 0 35%;position:relative;overflow:hidden;}
.img-wrap svg{position:absolute;inset:0;width:100%;height:100%;}

.type-pill{position:absolute;top:10px;left:10px;z-index:5;
  display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;
  font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;font-family:'Nunito',sans-serif;}
.tp-isim{background:rgba(244,63,94,.15);color:#be123c;border:1.5px solid rgba(244,63,94,.35);}
.tp-fiil{background:rgba(16,185,129,.15);color:#047857;border:1.5px solid rgba(16,185,129,.35);}
.tp-sifat{background:rgba(245,158,11,.15);color:#92400e;border:1.5px solid rgba(245,158,11,.35);}
.tp-zarf{background:rgba(139,92,246,.15);color:#5b21b6;border:1.5px solid rgba(139,92,246,.35);}
.tp-other{background:rgba(14,165,233,.15);color:#0c4a6e;border:1.5px solid rgba(14,165,233,.35);}

/* German sentence on front */
.front-sent{flex:1 1 0;min-height:0;padding:12px 18px 8px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.fkonu{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);margin-bottom:5px;font-weight:600;}
.fword{font-family:'Playfair Display',serif;font-size:clamp(22px,5.5vw,36px);font-weight:700;line-height:1.1;color:#1a1208;letter-spacing:-.3px;word-break:break-word;margin-bottom:10px;}
.fsent-de{font-family:'Playfair Display',serif;font-size:clamp(17px,4.5vw,24px);font-style:italic;line-height:1.6;color:#1a1208;}
.fsent-de strong{font-style:normal;font-weight:700;background:linear-gradient(135deg,#f43f5e,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.fhint{flex:0 0 auto;font-size:10px;color:var(--tf);font-weight:600;text-align:right;padding:5px 14px 9px;}

/* ── BACK ── */
.back{background:var(--white);}
.bhdr{flex:0 0 auto;padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.5px solid var(--bf);}
.bword{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,38px);font-weight:700;line-height:1;color:#1a1208;}
.bart{font-size:11px;font-weight:700;margin-top:4px;}
.art-die{color:#f43f5e;}.art-der{color:#0ea5e9;}.art-das{color:#10b981;}
.btype2{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:16px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:4px;}
.bsent{flex:1 1 0;min-height:0;padding:12px 20px 14px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.slbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);margin-bottom:8px;font-weight:700;}
.str{font-size:16px;line-height:1.6;color:var(--td);margin-bottom:10px;font-weight:500;}
.tip{background:linear-gradient(135deg,#fef9c3,#fce7f3);border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;padding:8px 12px;font-size:11px;line-height:1.55;color:#78350f;font-weight:600;}
.tip b{color:#92400e;}

/* CONTROLS */
.ctrl{flex:0 0 auto;width:100%;max-width:480px;display:flex;gap:8px;}
.btn{height:50px;border-radius:16px;font-size:13px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Nunito',sans-serif;-webkit-appearance:none;}
.btn:active{opacity:.75;}
.bn{flex:0 0 46px;background:var(--white);border:1.5px solid var(--b);color:var(--td);font-size:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.bw{flex:1;background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:1.5px solid rgba(244,63,94,.2);color:#f43f5e;}
.br{flex:1;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1.5px solid rgba(16,185,129,.2);color:#059669;}

.scores{flex:0 0 auto;width:100%;max-width:480px;display:flex;gap:8px;margin-top:10px;}
.sc{flex:1;background:var(--white);border:1.5px solid var(--b);border-radius:14px;padding:10px 0;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.sn{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;}
.sl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tf);margin-top:1px;font-weight:600;}
.sc-c .sn{color:#10b981;}.sc-w .sn{color:#f43f5e;}.sc-r .sn{color:#8b5cf6;}

.done{position:absolute;inset:0;border-radius:22px;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;box-shadow:0 6px 28px rgba(0,0,0,.1);}
.done h2{font-family:'Playfair Display',serif;font-size:30px;color:#1a1208;margin:12px 0 6px;}
.done p{font-size:13px;color:var(--td);margin-bottom:22px;font-weight:500;}
.done button{padding:12px 28px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f43f5e,#8b5cf6);color:#fff;border:none;font-family:'Nunito',sans-serif;}

@keyframes cIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:cIn .25s ease both;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Deutsch Karten<span class="logo-sub">B1 · B2 · 1500 Kelime</span></div>
  <div class="ctr" id="ctr">– / –</div>
</div>
<div class="topics" id="topicBar"></div>
<div class="tbar">
  <span class="tbl">Mod:</span>
  <button class="tbtn on" id="tbS" onclick="tog('s')">🔀 Karıştır</button>
  <button class="tbtn" id="tbW" onclick="tog('w')">❌ Yanlışlar</button>
</div>
<div class="prog"><div class="prog-fill" id="pf"></div></div>

<div class="stage">
  <div class="cw" id="cw">
    <div class="card-side front" id="cardFront">
      <div class="img-wrap" id="iz"></div>
      <div class="front-sent">
        <div class="fkonu" id="fk"></div>
        <div class="fword" id="fw"></div>
        <div class="fsent-de" id="fsd"></div>
      </div>
      <div class="fhint">dokunun · çevir ↩</div>
    </div>
    <div class="card-side back hidden" id="cardBack">
      <div class="bhdr">
        <div>
          <div class="bword" id="bw"></div>
          <div class="bart" id="ba"></div>
        </div>
        <div class="btype2" id="bt"></div>
      </div>
      <div class="bsent">
        <div class="slbl">Türkçe Anlam & İpucu</div>
        <div class="str" id="btr"></div>
        <div id="sa"></div>
      </div>
    </div>
  </div>

  <div class="ctrl">
    <button class="btn bn" onclick="prev()">◀</button>
    <button class="btn bw" onclick="mark(false)">✗ Bilmedim</button>
    <button class="btn br" onclick="mark(true)">✓ Bildim</button>
    <button class="btn bn" onclick="goNext()">▶</button>
  </div>
  <div class="scores">
    <div class="sc sc-c"><div class="sn" id="sc">0</div><div class="sl">Doğru</div></div>
    <div class="sc sc-w"><div class="sn" id="sw">0</div><div class="sl">Yanlış</div></div>
    <div class="sc sc-r"><div class="sn" id="sr">0</div><div class="sl">Kalan</div></div>
  </div>
</div>

<script>
const TE={"Aile ve ilişkiler":"👨‍👩‍👧","Tanışma ve kendini ifade etme":"🤝","İş ve meslek":"💼","Eğitim ve okul":"📚","Günlük rutinler":"☀️","Saatler günler ve tarihler":"🗓️","Ev ve yaşam":"🏠","Alışveriş":"🛍️","Yiyecek içecek":"🍽️","Restoran ve kafe":"☕","Sağlık ve hastalıklar":"🏥","Doktor ve hastane":"🩺","Ulaşım ve trafik":"🚗","Araba kullanma":"🛣️","Tatil ve seyahat":"✈️","Otel ve konaklama":"🏨","Hava durumu":"🌤️","Hobiler ve boş zaman":"🎨","Spor":"⚽","Televizyon film ve diziler":"🎬","Müzik":"🎵","İnternet ve teknoloji":"💻","Telefon görüşmeleri":"📞","Sosyal medya":"📱","Arkadaşlık ilişkileri":"👫","Aşk ve evlilik":"💍","Çocuklar ve ebeveynlik":"👶","Para ve bütçe":"💰","Banka işlemleri":"🏦","Sigorta":"🛡️","Kira ve ev sahibi":"🔑","Komşuluk ilişkileri":"🏘️","Resmî daireler ve belgeler":"📋","İş başvuruları":"📝","İş görüşmeleri":"🤵","İş yerindeki problemler":"⚠️","Müşteri hizmetleri":"🎯","Şikâyet ve reklamasyon":"📢","Çevre ve doğa":"🌿","Hayvanlar":"🐾","Kültür ve gelenekler":"🎭","Haberler ve güncel olaylar":"📰","Hukuk ve mahkeme":"⚖️","Göç ve oturum işlemleri":"🌍","Vatandaşlık işlemleri":"🏛️","Vergiler":"💹","Emeklilik":"🌅","Eğitim sistemi":"🎓","Gelecek planları":"🚀","Kişisel gelişim":"🎯"};
const TV={"Aile ve ilişkiler": ["#fde8f0", "#fbb6d4", "#f472b6"], "Tanışma ve kendini ifade etme": ["#fef3c7", "#fde68a", "#f59e0b"], "İş ve meslek": ["#e0f2fe", "#bae6fd", "#38bdf8"], "Eğitim ve okul": ["#fce7f3", "#fbcfe8", "#ec4899"], "Günlük rutinler": ["#fef9c3", "#fef08a", "#eab308"], "Saatler günler ve tarihler": ["#ede9fe", "#ddd6fe", "#8b5cf6"], "Ev ve yaşam": ["#dcfce7", "#bbf7d0", "#22c55e"], "Alışveriş": ["#fdf4ff", "#f5d0fe", "#d946ef"], "Yiyecek içecek": ["#fff7ed", "#fed7aa", "#f97316"], "Restoran ve kafe": ["#fdf2f8", "#fce7f3", "#ec4899"], "Sağlık ve hastalıklar": ["#ecfdf5", "#a7f3d0", "#10b981"], "Doktor ve hastane": ["#eff6ff", "#bfdbfe", "#3b82f6"], "Ulaşım ve trafik": ["#faf5ff", "#e9d5ff", "#a855f7"], "Araba kullanma": ["#f0fdf4", "#bbf7d0", "#16a34a"], "Tatil ve seyahat": ["#fff1f2", "#ffe4e6", "#fb7185"], "Otel ve konaklama": ["#fdf4ff", "#f5d0fe", "#c026d3"], "Hava durumu": ["#f0f9ff", "#bae6fd", "#0ea5e9"], "Hobiler ve boş zaman": ["#fff7ed", "#ffedd5", "#fb923c"], "Spor": ["#f0fdf4", "#dcfce7", "#4ade80"], "Televizyon film ve diziler": ["#fdf2f8", "#fce7f3", "#f472b6"], "Müzik": ["#faf5ff", "#ede9fe", "#a78bfa"], "İnternet ve teknoloji": ["#eff6ff", "#dbeafe", "#60a5fa"], "Telefon görüşmeleri": ["#f0fdf4", "#dcfce7", "#34d399"], "Sosyal medya": ["#fdf4ff", "#f5d0fe", "#e879f9"], "Arkadaşlık ilişkileri": ["#fff1f2", "#ffe4e6", "#f87171"], "Aşk ve evlilik": ["#fff0f6", "#ffd6e7", "#fb7185"], "Çocuklar ve ebeveynlik": ["#fefce8", "#fef9c3", "#facc15"], "Para ve bütçe": ["#f0fdf4", "#dcfce7", "#86efac"], "Banka işlemleri": ["#eff6ff", "#dbeafe", "#93c5fd"], "Sigorta": ["#ecfdf5", "#d1fae5", "#6ee7b7"], "Kira ve ev sahibi": ["#fffbeb", "#fef3c7", "#fcd34d"], "Komşuluk ilişkileri": ["#f0fdf4", "#bbf7d0", "#4ade80"], "Resmî daireler ve belgeler": ["#f8fafc", "#e2e8f0", "#94a3b8"], "İş başvuruları": ["#eff6ff", "#bfdbfe", "#60a5fa"], "İş görüşmeleri": ["#faf5ff", "#ede9fe", "#c4b5fd"], "İş yerindeki problemler": ["#fff7ed", "#fed7aa", "#fb923c"], "Müşteri hizmetleri": ["#ecfeff", "#cffafe", "#67e8f9"], "Şikâyet ve reklamasyon": ["#fff1f2", "#ffe4e6", "#fda4af"], "Çevre ve doğa": ["#f0fdf4", "#dcfce7", "#86efac"], "Hayvanlar": ["#fefce8", "#fef08a", "#fbbf24"], "Kültür ve gelenekler": ["#fff7ed", "#fed7aa", "#fdba74"], "Haberler ve güncel olaylar": ["#f8fafc", "#f1f5f9", "#94a3b8"], "Hukuk ve mahkeme": ["#faf5ff", "#ede9fe", "#a855f7"], "Göç ve oturum işlemleri": ["#eff6ff", "#dbeafe", "#3b82f6"], "Vatandaşlık işlemleri": ["#f0f9ff", "#e0f2fe", "#38bdf8"], "Vergiler": ["#f0fdf4", "#dcfce7", "#4ade80"], "Emeklilik": ["#fff7ed", "#ffedd5", "#fdba74"], "Eğitim sistemi": ["#fdf4ff", "#f5d0fe", "#d946ef"], "Gelecek planları": ["#eff6ff", "#dbeafe", "#818cf8"], "Kişisel gelişim": ["#f0fdf4", "#dcfce7", "#34d399"]};

const TCA={"isim":"#f43f5e","fiil":"#10b981","sıfat":"#f59e0b","zarf":"#8b5cf6"};
const TC={isim:{tp:'tp-isim',em:'📌',lbl:'İSİM'},fiil:{tp:'tp-fiil',em:'⚡',lbl:'FİİL'},'sıfat':{tp:'tp-sifat',em:'🎨',lbl:'SIFAT'},zarf:{tp:'tp-zarf',em:'➡️',lbl:'ZARF'}};

function makeSVG(konu,tur){
  const v=TV[konu]||['#fdf4ff','#f5d0fe','#d946ef'];
  const c1=v[0],c2=v[1],c3=v[2];
  const ac=TCA[tur]||'#0ea5e9';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="${c1}"/>
<stop offset="100%" stop-color="${c2}"/>
</linearGradient>
</defs>
<rect width="400" height="200" fill="url(#bg)"/>
<circle cx="320" cy="40" r="110" fill="${c3}" opacity=".25"/>
<circle cx="60" cy="170" r="80" fill="${ac}" opacity=".18"/>
<circle cx="190" cy="100" r="60" fill="white" opacity=".1"/>
</svg>`;
}

let W=[],deck=[],idx=0,flipped=false,scores={c:0,w:0},marked={},shuf=true,wrongOnly=false,topic='Tümü';

function init(){buildTopics();loadDeck();render();updateScores();}

function buildTopics(){
  const ts=['Tümü',...new Set(W.map(w=>w.k))];
  document.getElementById('topicBar').innerHTML=ts.map(t=>
    `<button class="tc${t===topic?' on':''}" onclick="selTopic(this,${JSON.stringify(t)})">${TE[t]||''} ${t}</button>`
  ).join('');
}

function selTopic(el,t){
  topic=t;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');idx=0;flipped=false;loadDeck();render();
}

function loadDeck(){
  let d=topic==='Tümü'?[...W]:W.filter(w=>w.k===topic);
  if(wrongOnly)d=d.filter(w=>marked[w.id]===false);
  if(shuf)d.sort(()=>Math.random()-.5);
  deck=d;
}

function showFront(){
  document.getElementById('cardFront').classList.remove('hidden');
  document.getElementById('cardBack').classList.add('hidden');
}
function showBack(){
  document.getElementById('cardFront').classList.add('hidden');
  document.getElementById('cardBack').classList.remove('hidden');
}

function render(){
  if(!deck.length){showEmpty();return;}
  const w=deck[idx];
  flipped=false;showFront();

  const cw=document.getElementById('cw');
  cw.classList.remove('anim');void cw.offsetWidth;cw.classList.add('anim');

  const tc=TC[w.tur]||{tp:'tp-other',em:'●',lbl:w.tur};

  // FRONT: SVG + type pill
  const iz=document.getElementById('iz');
  iz.innerHTML=makeSVG(w.k,w.tur);
  const pill=document.createElement('div');
  pill.className='type-pill '+tc.tp;
  pill.textContent=tc.em+' '+tc.lbl;
  iz.appendChild(pill);

  document.getElementById('fk').textContent=(TE[w.k]||'')+' '+w.k;
  document.getElementById('fw').textContent=w.de;

  // German sentence on FRONT
  const fsd=document.getElementById('fsd');
  if(w.s){
    fsd.innerHTML=w.s.replace(/\*\*([\s\S]*?)\*\*/g,'<strong>$1</strong>');
  } else {
    fsd.innerHTML=`<strong>${w.de}</strong> — ein wichtiges deutsches Wort.`;
  }

  // BACK: Turkish meaning + article + tip
  document.getElementById('bw').textContent=w.tr;
  const btEl=document.getElementById('bt');
  btEl.className='btype2 '+tc.tp;btEl.textContent=tc.em+' '+tc.lbl;
  const baEl=document.getElementById('ba');
  if(w.de.startsWith('die ')){baEl.textContent='→ die · dişil';baEl.className='bart art-die';}
  else if(w.de.startsWith('der ')){baEl.textContent='→ der · eril';baEl.className='bart art-der';}
  else if(w.de.startsWith('das ')){baEl.textContent='→ das · nötr';baEl.className='bart art-das';}
  else baEl.textContent='';

  // Turkish sentence on back
  document.getElementById('btr').textContent=w.t||'';
  const sa=document.getElementById('sa');
  sa.innerHTML=w.i?`<div class="tip"><b>💡 İpucu:</b> ${w.i}</div>`:'';

  const pct=deck.length?Math.round((idx+1)/deck.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('ctr').textContent=(idx+1)+' / '+deck.length;
  updateScores();
}

function flip(){if(!deck.length)return;flipped=!flipped;if(flipped)showBack();else showFront();}
document.getElementById('cw').addEventListener('click',flip);

function mark(ok){
  if(!deck.length)return;
  const w=deck[idx];
  if(marked[w.id]===undefined){if(ok)scores.c++;else scores.w++;marked[w.id]=ok;}
  updateScores();goNext();
}
function goNext(){if(!deck.length)return;if(idx<deck.length-1){idx++;render();}else showDone();}
function prev(){if(idx>0){idx--;render();}}
function tog(k){
  if(k==='s'){shuf=!shuf;document.getElementById('tbS').classList.toggle('on',shuf);}
  if(k==='w'){wrongOnly=!wrongOnly;document.getElementById('tbW').classList.toggle('on',wrongOnly);}
  loadDeck();idx=0;render();
}
function updateScores(){
  document.getElementById('sc').textContent=scores.c;
  document.getElementById('sw').textContent=scores.w;
  document.getElementById('sr').textContent=Math.max(0,deck.length-scores.c-scores.w);
}
function showDone(){
  const pct=deck.length?Math.round(scores.c/deck.length*100):0;
  const em=pct>=80?'🌸':pct>=50?'🌼':'🌱';
  const msg=pct>=80?'Mükemmel!':pct>=50?'İyi Gidiyorsun!':'Devam Et!';
  document.getElementById('cw').innerHTML=`<div class="done"><div style="font-size:54px">${em}</div><h2>${msg}</h2><p>${scores.c} / ${deck.length} doğru · %${pct}</p><button onclick="restart()">Tekrar Başla</button></div>`;
}
function restart(){
  scores={c:0,w:0};idx=0;
  document.getElementById('cw').innerHTML=`
    <div class="card-side front" id="cardFront">
      <div class="img-wrap" id="iz"></div>
      <div class="front-sent"><div class="fkonu" id="fk"></div><div class="fword" id="fw"></div><div class="fsent-de" id="fsd"></div></div>
      <div class="fhint">dokunun · çevir ↩</div>
    </div>
    <div class="card-side back hidden" id="cardBack">
      <div class="bhdr"><div><div class="bword" id="bw"></div><div class="bart" id="ba"></div></div><div class="btype2" id="bt"></div></div>
      <div class="bsent"><div class="slbl">Türkçe Anlam & İpucu</div><div class="str" id="btr"></div><div id="sa"></div></div>
    </div>`;
  document.getElementById('cw').addEventListener('click',flip);
  loadDeck();render();updateScores();
}
function showEmpty(){
  document.getElementById('cw').innerHTML='<div class="done"><div style="font-size:48px">🌿</div><h2>Kart Yok</h2><p>Filtre değiştirin</p></div>';
}
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')goNext();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='1')mark(true);
  else if(e.key==='0')mark(false);
});
