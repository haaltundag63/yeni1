e + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":944,"k":"Komşuluk ilişkileri","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":945,"k":"Komşuluk ilişkileri","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":946,"k":"Komşuluk ilişkileri","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":947,"k":"Komşuluk ilişkileri","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":948,"k":"Komşuluk ilişkileri","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":949,"k":"Komşuluk ilişkileri","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":950,"k":"Komşuluk ilişkileri","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":951,"k":"Komşuluk ilişkileri","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":952,"k":"Komşuluk ilişkileri","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":953,"k":"Komşuluk ilişkileri","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":954,"k":"Komşuluk ilişkileri","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":955,"k":"Komşuluk ilişkileri","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":956,"k":"Komşuluk ilişkileri","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":957,"k":"Komşuluk ilişkileri","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":958,"k":"Komşuluk ilişkileri","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":959,"k":"Komşuluk ilişkileri","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":960,"k":"Komşuluk ilişkileri","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":961,"k":"Resmî daireler ve belgeler","de":"die Bescheinigung","tur":"isim","tr":"belge","s":"Ich brauche eine **Bescheinigung** vom Arzt.","t":"Doktordan bir belge istiyorum.","i":"bescheinigen=belgelemek","e":"'bescheinigen': 'schein' (ışık, görünüş, Eski Almanca 'scînan'). 'Resmi ışıkta göstermek' → belgelendirmek."},{"id":962,"k":"Resmî daireler ve belgeler","de":"die Zuständigkeit","tur":"isim","tr":"yetki / sorumluluk alanı","s":"**die Zuständigkeit** spielt eine wichtige Rolle in unserem Alltag.","t":"die Zuständigkeit günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | yetki / sorumluluk alanı","e":"'-keit' soneki ('-heit'in varyantı) sıfatlardan soyut isim türetir → yetki / sorumluluk alanı niteliği."},{"id":963,"k":"Resmî daireler ve belgeler","de":"die Fristsetzung","tur":"isim","tr":"süre tanıma","s":"**die Fristsetzung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Fristsetzung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | süre tanıma","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Fristsetzen' → eylem → sonuç olarak süre tanıma."},{"id":964,"k":"Resmî daireler ve belgeler","de":"die Nachreichung","tur":"isim","tr":"sonradan sunma","s":"**die Nachreichung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Nachreichung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | sonradan sunma","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Nachreichen' → eylem → sonuç olarak sonradan sunma."},{"id":965,"k":"Resmî daireler ve belgeler","de":"die Antragstellung","tur":"isim","tr":"başvuru yapma","s":"**die Antragstellung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Antragstellung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | başvuru yapma","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Antragstellen' → eylem → sonuç olarak başvuru yapma."},{"id":966,"k":"Resmî daireler ve belgeler","de":"die Bearbeitungsdauer","tur":"isim","tr":"işlem süresi","s":"**die Bearbeitungsdauer** spielt eine wichtige Rolle in unserem Alltag.","t":"die Bearbeitungsdauer günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | işlem süresi","e":"'-er' soneki eylemci isim türetir (Eski Almanca '-âri', Latince '-arius'). 'Bearbeitungsdauer' = işlem süresi yapan kişi."},{"id":967,"k":"Resmî daireler ve belgeler","de":"beantragen","tur":"fiil","tr":"başvurmak","s":"Er hat Sozialhilfe **beantragt**.","t":"Sosyal yardım talebinde bulundu.","i":"Antrag → beantragen","e":"'be-' + 'Antrag'. 'Antrag' = başvuru (an+tragen). 'Talep sunmak' → başvurmak."},{"id":968,"k":"Resmî daireler ve belgeler","de":"nachreichen","tur":"fiil","tr":"sonradan sunmak","s":"Es ist sehr wichtig, rechtzeitig zu **nachreichen**.","t":"Zamanında sonradan sunmak çok önemlidir.","i":"nachreichen → sonradan sunmak","e":"Almanca kökenli kelime. 'nachreichen' → sonradan sunmak. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":969,"k":"Resmî daireler ve belgeler","de":"beglaubigen","tur":"fiil","tr":"onaylatmak","s":"Es ist sehr wichtig, rechtzeitig zu **beglaubigen**.","t":"Zamanında onaylatmak çok önemlidir.","i":"beglaubigen → onaylatmak","e":"Almanca kökenli kelime. 'beglaubigen' → onaylatmak. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":970,"k":"Resmî daireler ve belgeler","de":"behördlich","tur":"sıfat/zarf","tr":"resmî","s":"**behördlich** ist ein wichtiges deutsches Wort.","t":"behördlich önemli bir Almanca kelimedir.","i":"behördlich = resmî","e":"Almanca kökenli kelime. 'behördlich' → resmî. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":971,"k":"Resmî daireler ve belgeler","de":"die Auseinandersetzung","tur":"isim","tr":"tartışma / yüzleşme","s":"Die **Auseinandersetzung** mit dem Chef war laut.","t":"Patronla tartışma gürültülüydü.","i":"auseinander=ayrı ayrı","e":"'aus' + 'einander' + 'setzen'. Kelimenin tam anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":972,"k":"Resmî daireler ve belgeler","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiy  ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":1065,"k":"İş yerindeki problemler","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":1066,"k":"İş yerindeki problemler","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":1067,"k":"İş yerindeki problemler","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":1068,"k":"İş yerindeki problemler","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":1069,"k":"İş yerindeki problemler","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":1070,"k":"İş yerindeki problemler","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":1071,"k":"İş yerindeki problemler","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":1072,"k":"İş yerindeki problemler","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":1073,"k":"İş yerindeki problemler","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":1074,"k":"İş yerindeki problemler","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":1075,"k":"İş yerindeki problemler","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{" ertung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | geri dönüşüm","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Wiederverwerten' → eylem → sonuç olarak geri dönüşüm."},{"id":1145,"k":"Çevre ve doğa","de":"die Artenvielfalt","tur":"isim","tr":"tür çeşitliliği","s":"**die Artenvielfalt** spielt eine wichtige Rolle in unserem Alltag.","t":"die Artenvielfalt günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | tür çeşitliliği","e":"Almanca kökenli kelime. 'Artenvielfalt' → tür çeşitliliği. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":1146,"k":"Çevre ve doğa","de":"die Emissionsreduzierung","tur":"isim","tr":"emisyon azaltımı","s":"**die Emissionsreduzierung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Emissionsreduzierung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | emisyon azaltımı","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Emissionsreduzieren' → eylem → sonuç olarak emisyon azaltımı."},{"id":1147,"k":"Çevre ve doğa","de":"vermeiden","tur":"fiil","tr":"vermeiden","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":1148,"k":"Çevre ve doğa","de":"schonen","tur":"fiil","tr":"korumak / tasarruf etmek","s":"Es ist sehr wichtig, rechtzeitig zu **schonen**.","t":"Zamanında korumak / tasarruf etmek çok önemlidir.","i":"schonen → korumak / tasarruf etmek","e":"Almanca kökenli kelime. 'schonen' → korumak / tasarruf etmek. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":1149,"k":"Çevre ve doğa","de":"reduzieren","tur":"fiil","tr":"azaltmak","s":"Es ist sehr wichtig, rechtzeitig zu **reduzieren**.","t":"Zamanında azaltmak çok önemlidir.","i":"reduzieren → azaltmak","e":"Latince kökenli. '-ieren' soneki Latince veya Orta Latinceden Almancaya geçmiştir. Kök: 'reduzieren' → Türkçe karşılık: azaltmak."},{"id":1150,"k":"Çevre ve doğa","de":"umweltfreundlich","tur":"sıfat/zarf","tr":"çevre dostu","s":"**umweltfreundlich** ist ein wichtiges deutsches Wort.","t":"umweltfreundlich önemli bir Almanca kelimedir.","i":"umweltfreundlich = çevre dostu","e":"Almanca kökenli kelime. 'umweltfreundlich' → çevre dostu. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":1151,"k":"Çevre ve doğa","de":"die Auseinandersetzung","tur":"isim","tr":"tartışma / yüzleşme","s":"Die **Auseinandersetzung** mit dem Chef war laut.","t":"Patronla tartışma gürültülüydü.","i":"auseinander=ayrı ayrı","e":"'aus' + 'einander' + 'setzen'. Kelimenin tam anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":1152,"k":"Çevre ve doğa","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiyor.","i":"entwickeln=geliştirmek","e":"'ent-' (çıkarma) + 'Wicklung' (sarma, 'wickeln'den). 'Wickeln' Orta Almanca 'wickeln': sarmak, dolamak. Gelişim = sarılı olanı açmak."},{"id":1153,"k":"Çevre ve doğa","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t":"Dakiklik önemli bir ön koşuldur.","i":"voraus=önce + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":1154,"k":"Çevre ve doğa","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":1155,"k":"Çevre ve doğa","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":1156,"k":"Çevre ve doğa","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":1157,"k":"Çevre ve doğa","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":1158,"k":"Çevre ve doğa","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":1159,"k":"Çevre ve doğa","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":1160,"k":"Çevre ve doğa","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":1161,"k":"Çevre ve doğa","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Ge "etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":1186,"k":"Hayvanlar","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":1187,"k":"Hayvanlar","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":1188,"k":"Hayvanlar","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":1189,"k":"Hayvanlar","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":1190,"k":"Hayvanlar","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":1191,"k":"Hayvanlar","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":1192,"k":"Hayvanlar","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":1193,"k":"Hayvanlar","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":1194,"k":"Hayvanlar","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":1195,"k":"Hayvanlar","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":1196,"k":"Hayvanlar","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":1197,"k":"Hayvanlar","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i" m anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":1272,"k":"Hukuk ve mahkeme","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiyor.","i":"entwickeln=geliştirmek","e":"'ent-' (çıkarma) + 'Wicklung' (sarma, 'wickeln'den). 'Wickeln' Orta Almanca 'wickeln': sarmak, dolamak. Gelişim = sarılı olanı açmak."},{"id":1273,"k":"Hukuk ve mahkeme","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t":"Dakiklik önemli bir ön koşuldur.","i":"voraus=önce + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":1274,"k":"Hukuk ve mahkeme","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":1275,"k":"Hukuk ve mahkeme","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":1276,"k":"Hukuk ve mahkeme","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":1277,"k":"Hukuk ve mahkeme","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":1278,"k":"Hukuk ve mahkeme","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":1279,"k":"Hukuk ve mahkeme","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":1280,"k":"Hukuk ve mahkeme","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":1281,"k":"Hukuk ve mahkeme","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":1282,"k":"Hukuk ve mahkeme","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":1283,"k":"Hukuk ve mahkeme","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":1284,"k":"Hukuk ve mahkeme","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":1285,"k":"Hukuk ve mahkeme","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":1286,"k":"Hukuk ve mahkeme","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":1287,"k":"Hukuk ve mahkeme","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":1288,"k":"Hukuk ve mahkeme","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":1289,"k":"Hukuk ve mahkeme","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını ta rmeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":1347,"k":"Vatandaşlık işlemleri","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":1348,"k":"Vatandaşlık işlemleri","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":1349,"k":"Vatandaşlık işlemleri","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":1350,"k":"Vatandaşlık işlemleri","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":1351,"k":"Vergiler","de":"die Steuererklärung","tur":"isim","tr":"vergi beyannamesi","s":"**die Steuererklärung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Steuererklärung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | vergi beyannamesi","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Steuererklären' → eylem → sonuç olarak vergi beyannamesi."},{"id":1352,"k" "},{"id":1428,"k":"Eğitim sistemi","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":1429,"k":"Eğitim sistemi","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":1430,"k":"Eğitim sistemi","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":1431,"k":"Eğitim sistemi","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":1432,"k":"Eğitim sistemi","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":1433,"k":"Eğitim sistemi","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":1434,"k":"Eğitim sistemi","de":
