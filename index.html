<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Deutsch Karten</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf7f4;--white:#fff;--b:rgba(0,0,0,.07);--bf:rgba(0,0,0,.04);--t:#1a1208;--td:rgba(26,18,8,.5);--tf:rgba(26,18,8,.35);}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Nunito',sans-serif;color:var(--t);display:flex;flex-direction:column;}
.hdr{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--white);border-bottom:1px solid var(--b);box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;background:linear-gradient(135deg,#f43f5e,#8b5cf6,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:9px;font-family:'Nunito',sans-serif;letter-spacing:2px;text-transform:uppercase;display:block;-webkit-text-fill-color:var(--tf);color:var(--tf);}
.ctr{font-size:11px;font-weight:700;color:#8b5cf6;background:rgba(139,92,246,.1);border:1.5px solid rgba(139,92,246,.25);padding:5px 12px;border-radius:20px;}
.topics{flex:0 0 auto;display:flex;gap:6px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--bf);}
.topics::-webkit-scrollbar{display:none;}
.tc{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;border:1.5px solid var(--b);color:var(--td);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;}
.tc.on{background:linear-gradient(135deg,#f9a8d4,#c4b5fd);border-color:rgba(109,40,217,.4);color:#5b21b6;}
.tbar{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(--white);border-bottom:1px solid var(--bf);overflow-x:auto;scrollbar-width:none;}
.tbar::-webkit-scrollbar{display:none;}
.tbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);white-space:nowrap;}
.tbtn{padding:4px 11px;border-radius:8px;font-size:10px;font-weight:700;border:1.5px solid var(--b);color:var(--td);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;}
.tbtn.on{background:linear-gradient(135deg,#f9a8d4,#c4b5fd);border-color:rgba(109,40,217,.4);color:#5b21b6;}
.prog{flex:0 0 4px;background:#e0d0ff;}
.prog-fill{height:4px;background:linear-gradient(90deg,#f43f5e,#8b5cf6,#0ea5e9);width:0;transition:width .5s ease;}
.stage{flex:1 1 0;min-height:0;display:flex;flex-direction:column;align-items:center;padding:12px 14px 10px;overflow:hidden;}
.cw{width:100%;max-width:700px;flex:1 1 0;min-height:0;max-height:600px;cursor:pointer;margin-bottom:12px;position:relative;}
.card-side{position:absolute;inset:0;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 28px rgba(0,0,0,.11),0 2px 6px rgba(0,0,0,.06);}
.card-side.hidden{display:none;}

/* FRONT */
.front{background:var(--white);}
.img-wrap{flex:0 0 32%;position:relative;overflow:hidden;}
.img-wrap svg{position:absolute;inset:0;width:100%;height:100%;}
.type-pill{position:absolute;top:10px;left:10px;z-index:5;display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;font-family:'Nunito',sans-serif;}
.tp-isim{background:rgba(244,63,94,.18);color:#be123c;border:1.5px solid rgba(244,63,94,.4);}
.tp-fiil{background:rgba(16,185,129,.18);color:#047857;border:1.5px solid rgba(16,185,129,.4);}
.tp-sifat{background:rgba(245,158,11,.18);color:#92400e;border:1.5px solid rgba(245,158,11,.4);}
.tp-zarf{background:rgba(139,92,246,.18);color:#5b21b6;border:1.5px solid rgba(139,92,246,.4);}
.tp-other{background:rgba(14,165,233,.18);color:#0c4a6e;border:1.5px solid rgba(14,165,233,.4);}
.front-body{flex:1 1 0;min-height:0;padding:12px 18px 6px;display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden;}
.fkonu{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);margin-bottom:4px;font-weight:600;}
.fword{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,48px);font-weight:700;line-height:1.05;color:#1a1208;letter-spacing:-.3px;word-break:break-word;margin-bottom:10px;}
.fsent-de{font-family:'Playfair Display',serif;font-size:clamp(17px,2.8vw,28px);font-style:italic;line-height:1.6;color:#1a1208;margin-bottom:10px;}
.fsent-de strong{font-style:normal;font-weight:700;background:linear-gradient(135deg,#f43f5e,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ETYMOLOGY box on front */
.etym-box{background:linear-gradient(135deg,#fef9c3,#ede9fe);border-left:3px solid #8b5cf6;border-radius:0 10px 10px 0;padding:9px 13px;font-size:clamp(10px,1.8vw,13px);line-height:1.55;color:#3b0764;font-weight:600;margin-top:auto;}
.etym-box b{color:#5b21b6;font-size:9px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;}

.fhint{flex:0 0 auto;font-size:10px;color:var(--tf);font-weight:600;text-align:right;padding:5px 14px 9px;}

/* BACK */
.back{background:var(--white);}
.bhdr{flex:0 0 auto;padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.5px solid var(--bf);}
.bword{font-family:'Playfair Display',serif;font-size:clamp(22px,3.5vw,44px);font-weight:700;line-height:1;color:#1a1208;}
.bart{font-size:11px;font-weight:700;margin-top:4px;}
.art-die{color:#f43f5e;}.art-der{color:#0ea5e9;}.art-das{color:#10b981;}
.btype2{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:16px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:4px;}
.bsent{flex:1 1 0;min-height:0;padding:12px 20px 14px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.slbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tf);margin-bottom:8px;font-weight:700;}
.str{font-size:16px;line-height:1.6;color:var(--td);margin-bottom:10px;font-weight:500;}
.tip{background:linear-gradient(135deg,#fef9c3,#fce7f3);border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;padding:8px 12px;font-size:11px;line-height:1.55;color:#78350f;font-weight:600;}
.tip b{color:#92400e;}
.ctrl{flex:0 0 auto;width:100%;max-width:700px;display:flex;gap:8px;}
.btn{height:56px;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Nunito',sans-serif;-webkit-appearance:none;}
.btn:active{opacity:.75;}
.bn{flex:0 0 48px;background:var(--white);border:1.5px solid var(--b);color:var(--td);font-size:18px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.bw{flex:1;background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:1.5px solid rgba(244,63,94,.2);color:#f43f5e;}
.br{flex:1;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1.5px solid rgba(16,185,129,.2);color:#059669;}
.scores{flex:0 0 auto;width:100%;max-width:700px;display:flex;gap:8px;margin-top:10px;}
.sc{flex:1;background:var(--white);border:1.5px solid var(--b);border-radius:14px;padding:10px 0;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.sn{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;}
.sl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tf);margin-top:1px;font-weight:600;}
.sc-c .sn{color:#10b981;}.sc-w .sn{color:#f43f5e;}.sc-r .sn{color:#8b5cf6;}
.done{position:absolute;inset:0;border-radius:22px;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;box-shadow:0 6px 28px rgba(0,0,0,.1);}
.done h2{font-family:'Playfair Display',serif;font-size:30px;color:#1a1208;margin:12px 0 6px;}
.done p{font-size:13px;color:var(--td);margin-bottom:22px;font-weight:500;}
.done button{padding:12px 28px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#f43f5e,#8b5cf6);color:#fff;border:none;font-family:'Nunito',sans-serif;}
@keyframes cIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:cIn .25s ease both;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Deutsch Karten<span class="logo-sub">B1 · B2 · 1500 Kelime</span></div>
  <div class="ctr" id="ctr">– / –</div>
</div>
<div class="topics" id="topicBar"></div>
<div class="tbar">
  <span class="tbl">Mod:</span>
  <button class="tbtn on" id="tbS" onclick="tog('s')">🔀 Karıştır</button>
  <button class="tbtn" id="tbW" onclick="tog('w')">❌ Yanlışlar</button>
</div>
<div class="prog"><div class="prog-fill" id="pf"></div></div>
<div class="stage">
  <div class="cw" id="cw">
    <div class="card-side front" id="cardFront">
      <div class="img-wrap" id="iz"></div>
      <div class="front-body">
        <div class="fkonu" id="fk"></div>
        <div class="fword" id="fw"></div>
        <div class="fsent-de" id="fsd"></div>
        <div class="etym-box" id="eb"><b>🌱 Köken</b><span id="etxt"></span></div>
      </div>
      <div class="fhint">dokunun · çevir ↩</div>
    </div>
    <div class="card-side back hidden" id="cardBack">
      <div class="bhdr">
        <div><div class="bword" id="bw"></div><div class="bart" id="ba"></div></div>
        <div class="btype2" id="bt"></div>
      </div>
      <div class="bsent">
        <div class="slbl">Türkçe Anlam & Cümle</div>
        <div class="str" id="btr"></div>
        <div id="sa"></div>
      </div>
    </div>
  </div>
  <div class="ctrl">
    <button class="btn bn" onclick="prev()">◀</button>
    <button class="btn bw" onclick="mark(false)">✗ Bilmedim</button>
    <button class="btn br" onclick="mark(true)">✓ Bildim</button>
    <button class="btn bn" onclick="goNext()">▶</button>
  </div>
  <div class="scores">
    <div class="sc sc-c"><div class="sn" id="sc">0</div><div class="sl">Doğru</div></div>
    <div class="sc sc-w"><div class="sn" id="sw">0</div><div class="sl">Yanlış</div></div>
    <div class="sc sc-r"><div class="sn" id="sr">0</div><div class="sl">Kalan</div></div>
  </div>
</div>
<script>
const TE={"Aile ve ilişkiler":"👨‍👩‍👧","Tanışma ve kendini ifade etme":"🤝","İş ve meslek":"💼","Eğitim ve okul":"📚","Günlük rutinler":"☀️","Saatler günler ve tarihler":"🗓️","Ev ve yaşam":"🏠","Alışveriş":"🛍️","Yiyecek içecek":"🍽️","Restoran ve kafe":"☕","Sağlık ve hastalıklar":"🏥","Doktor ve hastane":"🩺","Ulaşım ve trafik":"🚗","Araba kullanma":"🛣️","Tatil ve seyahat":"✈️","Otel ve konaklama":"🏨","Hava durumu":"🌤️","Hobiler ve boş zaman":"🎨","Spor":"⚽","Televizyon film ve diziler":"🎬","Müzik":"🎵","İnternet ve teknoloji":"💻","Telefon görüşmeleri":"📞","Sosyal medya":"📱","Arkadaşlık ilişkileri":"👫","Aşk ve evlilik":"💍","Çocuklar ve ebeveynlik":"👶","Para ve bütçe":"💰","Banka işlemleri":"🏦","Sigorta":"🛡️","Kira ve ev sahibi":"🔑","Komşuluk ilişkileri":"🏘️","Resmî daireler ve belgeler":"📋","İş başvuruları":"📝","İş görüşmeleri":"🤵","İş yerindeki problemler":"⚠️","Müşteri hizmetleri":"🎯","Şikâyet ve reklamasyon":"📢","Çevre ve doğa":"🌿","Hayvanlar":"🐾","Kültür ve gelenekler":"🎭","Haberler ve güncel olaylar":"📰","Hukuk ve mahkeme":"⚖️","Göç ve oturum işlemleri":"🌍","Vatandaşlık işlemleri":"🏛️","Vergiler":"💹","Emeklilik":"🌅","Eğitim sistemi":"🎓","Gelecek planları":"🚀","Kişisel gelişim":"🎯"};
const TV={"Aile ve ilişkiler": ["#f9a8c9", "#f472b6", "#db2777"], "Tanışma ve kendini ifade etme": ["#fcd34d", "#f59e0b", "#d97706"], "İş ve meslek": ["#7dd3fc", "#38bdf8", "#0284c7"], "Eğitim ve okul": ["#f9a8d4", "#ec4899", "#be185d"], "Günlük rutinler": ["#fde047", "#eab308", "#a16207"], "Saatler günler ve tarihler": ["#c4b5fd", "#8b5cf6", "#6d28d9"], "Ev ve yaşam": ["#86efac", "#22c55e", "#15803d"], "Alışveriş": ["#e879f9", "#d946ef", "#a21caf"], "Yiyecek içecek": ["#fdba74", "#f97316", "#c2410c"], "Restoran ve kafe": ["#f9a8d4", "#ec4899", "#be185d"], "Sağlık ve hastalıklar": ["#6ee7b7", "#10b981", "#047857"], "Doktor ve hastane": ["#93c5fd", "#3b82f6", "#1d4ed8"], "Ulaşım ve trafik": ["#c4b5fd", "#a855f7", "#7e22ce"], "Araba kullanma": ["#86efac", "#16a34a", "#166534"], "Tatil ve seyahat": ["#fda4af", "#fb7185", "#e11d48"], "Otel ve konaklama": ["#e879f9", "#c026d3", "#86198f"], "Hava durumu": ["#7dd3fc", "#0ea5e9", "#0369a1"], "Hobiler ve boş zaman": ["#fdba74", "#fb923c", "#c2410c"], "Spor": ["#86efac", "#4ade80", "#16a34a"], "Televizyon film ve diziler": ["#f9a8d4", "#f472b6", "#be185d"], "Müzik": ["#c4b5fd", "#a78bfa", "#6d28d9"], "İnternet ve teknoloji": ["#93c5fd", "#60a5fa", "#1d4ed8"], "Telefon görüşmeleri": ["#6ee7b7", "#34d399", "#047857"], "Sosyal medya": ["#e879f9", "#d946ef", "#86198f"], "Arkadaşlık ilişkileri": ["#fca5a5", "#f87171", "#dc2626"], "Aşk ve evlilik": ["#fda4af", "#fb7185", "#be123c"], "Çocuklar ve ebeveynlik": ["#fde047", "#facc15", "#a16207"], "Para ve bütçe": ["#86efac", "#4ade80", "#166534"], "Banka işlemleri": ["#93c5fd", "#60a5fa", "#1d4ed8"], "Sigorta": ["#6ee7b7", "#34d399", "#065f46"], "Kira ve ev sahibi": ["#fcd34d", "#fbbf24", "#92400e"], "Komşuluk ilişkileri": ["#86efac", "#4ade80", "#15803d"], "Resmî daireler ve belgeler": ["#cbd5e1", "#94a3b8", "#475569"], "İş başvuruları": ["#93c5fd", "#60a5fa", "#1e40af"], "İş görüşmeleri": ["#c4b5fd", "#a78bfa", "#5b21b6"], "İş yerindeki problemler": ["#fdba74", "#fb923c", "#9a3412"], "Müşteri hizmetleri": ["#67e8f9", "#22d3ee", "#0e7490"], "Şikâyet ve reklamasyon": ["#fca5a5", "#f87171", "#991b1b"], "Çevre ve doğa": ["#86efac", "#4ade80", "#166534"], "Hayvanlar": ["#fde047", "#fbbf24", "#92400e"], "Kültür ve gelenekler": ["#fdba74", "#fb923c", "#9a3412"], "Haberler ve güncel olaylar": ["#cbd5e1", "#94a3b8", "#334155"], "Hukuk ve mahkeme": ["#c4b5fd", "#a855f7", "#581c87"], "Göç ve oturum işlemleri": ["#93c5fd", "#3b82f6", "#1e3a8a"], "Vatandaşlık işlemleri": ["#7dd3fc", "#0ea5e9", "#075985"], "Vergiler": ["#86efac", "#4ade80", "#14532d"], "Emeklilik": ["#fdba74", "#fb923c", "#7c2d12"], "Eğitim sistemi": ["#e879f9", "#d946ef", "#701a75"], "Gelecek planları": ["#a5b4fc", "#818cf8", "#3730a3"], "Kişisel gelişim": ["#6ee7b7", "#34d399", "#064e3b"]};

const TCA={"isim":"#f43f5e","fiil":"#10b981","sıfat":"#f59e0b","zarf":"#8b5cf6"};
const TC={isim:{tp:'tp-isim',em:'📌',lbl:'İSİM'},fiil:{tp:'tp-fiil',em:'⚡',lbl:'FİİL'},'sıfat':{tp:'tp-sifat',em:'🎨',lbl:'SIFAT'},zarf:{tp:'tp-zarf',em:'➡️',lbl:'ZARF'}};

function makeSVG(konu,tur){
  const v=TV[konu]||['#f9a8d4','#f472b6','#db2777'];
  const c1=v[0],c2=v[1],c3=v[2];
  const ac=TCA[tur]||'#0ea5e9';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><rect width="400" height="200" fill="url(#bg)"/><circle cx="320" cy="40" r="110" fill="${c3}" opacity=".25"/><circle cx="60" cy="170" r="80" fill="${ac}" opacity=".18"/><circle cx="190" cy="100" r="60" fill="white" opacity=".1"/></svg>`;
}

let W=[],deck=[],idx=0,flipped=false,scores={c:0,w:0},marked={},shuf=true,wrongOnly=false,topic='Tümü';

function init(){buildTopics();loadDeck();render();updateScores();}

function buildTopics(){
  const ts=['Tümü',...new Set(W.map(w=>w.k))];
  document.getElementById('topicBar').innerHTML=ts.map(t=>
    `<button class="tc${t===topic?' on':''}" onclick="selTopic(this,${JSON.stringify(t)})">${TE[t]||''} ${t}</button>`
  ).join('');
}
function selTopic(el,t){topic=t;document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));el.classList.add('on');idx=0;flipped=false;loadDeck();render();}
function loadDeck(){
  let d=topic==='Tümü'?[...W]:W.filter(w=>w.k===topic);
  if(wrongOnly)d=d.filter(w=>marked[w.id]===false);
  if(shuf)d.sort(()=>Math.random()-.5);
  deck=d;
}
function showFront(){document.getElementById('cardFront').classList.remove('hidden');document.getElementById('cardBack').classList.add('hidden');}
function showBack(){document.getElementById('cardFront').classList.add('hidden');document.getElementById('cardBack').classList.remove('hidden');}

function render(){
  if(!deck.length){showEmpty();return;}
  const w=deck[idx];
  flipped=false;showFront();
  const cw=document.getElementById('cw');
  cw.classList.remove('anim');void cw.offsetWidth;cw.classList.add('anim');
  const tc=TC[w.tur]||{tp:'tp-other',em:'●',lbl:w.tur};

  // FRONT
  const iz=document.getElementById('iz');
  iz.innerHTML=makeSVG(w.k,w.tur);
  const pill=document.createElement('div');
  pill.className='type-pill '+tc.tp;
  pill.textContent=tc.em+' '+tc.lbl;
  iz.appendChild(pill);
  document.getElementById('fk').textContent=(TE[w.k]||'')+' '+w.k;
  document.getElementById('fw').textContent=w.de;
  const fsd=document.getElementById('fsd');
  fsd.innerHTML=w.s?w.s.replace(/\*\*([\s\S]*?)\*\*/g,'<strong>$1</strong>'):`<strong>${w.de}</strong> — ein wichtiges Wort.`;
  document.getElementById('etxt').textContent=w.e||'';

  // BACK
  document.getElementById('bw').textContent=w.tr;
  const btEl=document.getElementById('bt');btEl.className='btype2 '+tc.tp;btEl.textContent=tc.em+' '+tc.lbl;
  const baEl=document.getElementById('ba');
  if(w.de.startsWith('die ')){baEl.textContent='→ die · dişil';baEl.className='bart art-die';}
  else if(w.de.startsWith('der ')){baEl.textContent='→ der · eril';baEl.className='bart art-der';}
  else if(w.de.startsWith('das ')){baEl.textContent='→ das · nötr';baEl.className='bart art-das';}
  else baEl.textContent='';
  document.getElementById('btr').textContent=w.t||'';
  document.getElementById('sa').innerHTML=w.i?`<div class="tip"><b>💡 İpucu:</b> ${w.i}</div>`:'';

  const pct=deck.length?Math.round((idx+1)/deck.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('ctr').textContent=(idx+1)+' / '+deck.length;
  updateScores();
}

function flip(){if(!deck.length)return;flipped=!flipped;if(flipped)showBack();else showFront();}
document.getElementById('cw').addEventListener('click',flip);
function mark(ok){if(!deck.length)return;const w=deck[idx];if(marked[w.id]===undefined){if(ok)scores.c++;else scores.w++;marked[w.id]=ok;}updateScores();goNext();}
function goNext(){if(!deck.length)return;if(idx<deck.length-1){idx++;render();}else showDone();}
function prev(){if(idx>0){idx--;render();}}
function tog(k){
  if(k==='s'){shuf=!shuf;document.getElementById('tbS').classList.toggle('on',shuf);}
  if(k==='w'){wrongOnly=!wrongOnly;document.getElementById('tbW').classList.toggle('on',wrongOnly);}
  loadDeck();idx=0;render();
}
function updateScores(){document.getElementById('sc').textContent=scores.c;document.getElementById('sw').textContent=scores.w;document.getElementById('sr').textContent=Math.max(0,deck.length-scores.c-scores.w);}
function showDone(){
  const pct=deck.length?Math.round(scores.c/deck.length*100):0;
  const em=pct>=80?'🌸':pct>=50?'🌼':'🌱';
  const msg=pct>=80?'Mükemmel!':pct>=50?'İyi Gidiyorsun!':'Devam Et!';
  document.getElementById('cw').innerHTML=`<div class="done"><div style="font-size:54px">${em}</div><h2>${msg}</h2><p>${scores.c} / ${deck.length} doğru · %${pct}</p><button onclick="restart()">Tekrar Başla</button></div>`;
}
function restart(){
  scores={c:0,w:0};idx=0;
  document.getElementById('cw').innerHTML=`
  <div class="card-side front" id="cardFront"><div class="img-wrap" id="iz"></div><div class="front-body"><div class="fkonu" id="fk"></div><div class="fword" id="fw"></div><div class="fsent-de" id="fsd"></div><div class="etym-box" id="eb"><b>🌱 Köken</b><span id="etxt"></span></div></div><div class="fhint">dokunun · çevir ↩</div></div>
  <div class="card-side back hidden" id="cardBack"><div class="bhdr"><div><div class="bword" id="bw"></div><div class="bart" id="ba"></div></div><div class="btype2" id="bt"></div></div><div class="bsent"><div class="slbl">Türkçe Anlam & Cümle</div><div class="str" id="btr"></div><div id="sa"></div></div></div>`;
  document.getElementById('cw').addEventListener('click',flip);
  loadDeck();render();updateScores();
}
function showEmpty(){document.getElementById('cw').innerHTML='<div class="done"><div style="font-size:48px">🌿</div><h2>Kart Yok</h2><p>Filtre değiştirin</p></div>';}
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}
  else if(e.key==='ArrowRight')goNext();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key==='1')mark(true);
  else if(e.key==='0')mark(false);
});

<script>W=[{"id":1,"k":"Aile ve ilişkiler","de":"die Bindung","tur":"isim","tr":"bağ","s":"Die **Bindung** zwischen Mutter und Kind ist unzertrennlich.","t":"Anne ile çocuk arasındaki bağ kopmaz.","i":"binden=bağlamak → Bindung","e":"Eski Almanca 'bindan' (bağlamak) → Orta Yüksek Almanca 'binden' → die Bindung. Aynı kök: Band, Bund, verbinden."},{"id":2,"k":"Aile ve ilişkiler","de":"die Wertschätzung","tur":"isim","tr":"takdir","s":"**Wertschätzung** ist die Grundlage jeder guten Beziehung.","t":"Takdir her iyi ilişkinin temelidir.","i":"Wert=değer + schätzen=takdir","e":"'Wert' (değer) + 'schätzen' (takdir etmek, tahmin etmek). 'Schätzen' Orta Yüksek Almanca 'schetzen'den gelir, 'hazine değeri biçmek' anlamında."},{"id":3,"k":"Aile ve ilişkiler","de":"die Kompromissbereitschaft","tur":"isim","tr":"uzlaşma isteği","s":"Ohne **Kompromissbereitschaft** scheitern viele Ehen.","t":"Uzlaşma isteği olmadan çok evlilik çöker.","i":"Kompromiss+Bereitschaft","e":"Latince 'compromissum' (ortak söz) → Fransızca 'compromis' + Almanca 'Bereitschaft' (hazır olma hali). 'Bereit' Eski Almanca 'bireiti' (yola hazır) sözcüğünden."},{"id":4,"k":"Aile ve ilişkiler","de":"die Rücksichtnahme","tur":"isim","tr":"düşüncelilik","s":"**Rücksichtnahme** bedeutet, an andere zu denken.","t":"Düşüncelilik başkalarını düşünmek demektir.","i":"Rücksicht=saygı","e":"'Rück' (geri) + 'Sicht' (bakış) + 'Nahme' (alma). Yani 'arkaya bakma eylemi' → başkasını gözetme, düşüncelilik."},{"id":5,"k":"Aile ve ilişkiler","de":"die Entfremdung","tur":"isim","tr":"yabancılaşma","s":"Nach Jahren entstand eine **Entfremdung** zwischen ihnen.","t":"Yıllar sonra aralarında yabancılaşma oluştu.","i":"entfremden=yabancılaştırmak","e":"'ent-' (uzaklaştırma öneki) + 'fremd' (yabancı, Eski Almanca 'fremidi') + '-ung'. 'Fremd' Gotça 'framaþs'tan gelir: uzak, başka yerden."},{"id":6,"k":"Aile ve ilişkiler","de":"die Fürsorge","tur":"isim","tr":"ilgi / bakım","s":"Die **Fürsorge** für alte Menschen ist sehr wichtig.","t":"Yaşlılara bakım çok önemlidir.","i":"für+sorgen=birine bakmak","e":"'für' (için) + 'Sorge' (kaygı, Eski Almanca 'sorga'). Gotça 'saurga' = yas, kaygı. 'Fürsorge' = birileri için kaygılanmak → bakım."},{"id":7,"k":"Aile ve ilişkiler","de":"wertschätzen","tur":"fiil","tr":"değer vermek","s":"Ich **wertschätze** deine Hilfe wirklich sehr.","t":"Yardımına gerçekten çok değer veriyorum.","i":"Wert+schätzen → değer vermek","e":"'Wert' (değer, Eski Almanca 'werd') + 'schätzen'. 'Wert' Gotça 'waírþs'tan: fiyatı olan, değerli."},{"id":8,"k":"Aile ve ilişkiler","de":"vernachlässigen","tur":"fiil","tr":"ihmal etmek","s":"Er hat seine Gesundheit jahrelang **vernachlässigt**.","t":"Sağlığını yıllarca ihmal etti.","i":"lassen=bırakmak → ihmal","e":"'ver-' (kötüleştirme öneki) + 'nachlässig' (ihmalkar). 'Lässig' Orta Yüksek Almanca 'lâzec': gevşek, bırakık. Kök: 'lassen' (bırakmak)."},{"id":9,"k":"Aile ve ilişkiler","de":"vermitteln","tur":"fiil","tr":"arabuluculuk yapmak","s":"Sie hat zwischen den Parteien **vermittelt**.","t":"Taraflar arasında arabuluculuk yaptı.","i":"Vermittler=arabulucu","e":"'ver-' + 'Mitte' (orta, Latince 'medius'tan). 'Mittler' = ortada duran kişi → arabulucu. 'Mitte' Eski Almanca 'mitti'den."},{"id":10,"k":"Aile ve ilişkiler","de":"belastend","tur":"sıfat","tr":"yıpratıcı","s":"Die Situation ist sehr **belastend** für die Familie.","t":"Bu durum aile için çok yıpratıcı.","i":"Belastung=yük → yıpratıcı","e":"'be-' + 'Last' (yük, Eski Almanca 'hlast') + '-end'. 'Last' Gotça 'hlasts': gemi yükü. Yük bindiren → yıpratıcı."},{"id":11,"k":"Aile ve ilişkiler","de":"die Auseinandersetzung","tur":"isim","tr":"tartışma / yüzleşme","s":"Die **Auseinandersetzung** mit dem Chef war laut.","t":"Patronla tartışma gürültülüydü.","i":"auseinander=ayrı ayrı","e":"'aus' + 'einander' + 'setzen'. Kelimenin tam anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":12,"k":"Aile ve ilişkiler","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiyor.","i":"entwickeln=geliştirmek","e":"'ent-' (çıkarma) + 'Wicklung' (sarma, 'wickeln'den). 'Wickeln' Orta Almanca 'wickeln': sarmak, dolamak. Gelişim = sarılı olanı açmak."},{"id":13,"k":"Aile ve ilişkiler","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t":"Dakiklik önemli bir ön koşuldur.","i":"voraus=önce + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":14,"k":"Aile ve ilişkiler","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":15,"k":"Aile ve ilişkiler","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":16,"k":"Aile ve ilişkiler","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":17,"k":"Aile ve ilişkiler","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":18,"k":"Aile ve ilişkiler","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":19,"k":"Aile ve ilişkiler","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":20,"k":"Aile ve ilişkiler","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":21,"k":"Aile ve ilişkiler","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":22,"k":"Aile ve ilişkiler","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":23,"k":"Aile ve ilişkiler","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":24,"k":"Aile ve ilişkiler","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":25,"k":"Aile ve ilişkiler","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":26,"k":"Aile ve ilişkiler","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":27,"k":"Aile ve ilişkiler","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":28,"k":"Aile ve ilişkiler","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":29,"k":"Aile ve ilişkiler","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":30,"k":"Aile ve ilişkiler","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":31,"k":"Tanışma ve kendini ifade etme","de":"die Selbstdarstellung","tur":"isim","tr":"kendini sunma","s":"**die Selbstdarstellung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Selbstdarstellung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | kendini sunma","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Selbstdarstellen' → eylem → sonuç olarak kendini sunma."},{"id":32,"k":"Tanışma ve kendini ifade etme","de":"die Ausdrucksweise","tur":"isim","tr":"ifade tarzı","s":"**die Ausdrucksweise** spielt eine wichtige Rolle in unserem Alltag.","t":"die Ausdrucksweise günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | ifade tarzı","e":"Almanca kökenli kelime. 'Ausdrucksweise' → ifade tarzı. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":33,"k":"Tanışma ve kendini ifade etme","de":"die Zurückhaltung","tur":"isim","tr":"çekingenlik","s":"**die Zurückhaltung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Zurückhaltung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | çekingenlik","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Zurückhalten' → eylem → sonuç olarak çekingenlik."},{"id":34,"k":"Tanışma ve kendini ifade etme","de":"die Offenheit","tur":"isim","tr":"açıklık","s":"**die Offenheit** spielt eine wichtige Rolle in unserem Alltag.","t":"die Offenheit günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | açıklık","e":"'-heit' soneki (Eski Almanca '-heit': varlık, hal) sıfatlardan soyut isim türetir → açıklık hali."},{"id":35,"k":"Tanışma ve kendini ifade etme","de":"die Ausstrahlung","tur":"isim","tr":"duruş / etki","s":"**die Ausstrahlung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Ausstrahlung günlük hayatımızda önemli rol oynar.","i":"→ ok önemlidir.","i":"strukturieren → yapılandırmak","e":"Latince kökenli. '-ieren' soneki Latince veya Orta Latinceden Almancaya geçmiştir. Kök: 'strukturieren' → Türkçe karşılık: yapılandırmak."},{"id":128,"k":"Günlük rutinler","de":"erledigen","tur":"fiil","tr":"halletmek","s":"Es ist sehr wichtig, rechtzeitig zu **erledigen**.","t":"Zamanında halletmek çok önemlidir.","i":"erledigen → halletmek","e":"Almanca kökenli kelime. 'erledigen' → halletmek. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":129,"k":"Günlük rutinler","de":"einhalten","tur":"fiil","tr":"uymak","s":"Es ist sehr wichtig, rechtzeitig zu **einhalten**.","t":"Zamanında uymak çok önemlidir.","i":"einhalten → uymak","e":"Almanca kökenli kelime. 'einhalten' → uymak. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":130,"k":"Günlük rutinler","de":"reibungslos","tur":"sıfat/zarf","tr":"sorunsuz","s":"**reibungslos** ist ein wichtiges deutsches Wort.","t":"reibungslos önemli bir Almanca kelimedir.","i":"reibungslos = sorunsuz","e":"Almanca kökenli kelime. 'reibungslos' → sorunsuz. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":131,"k":"Günlük rutinler","de":"die Auseinandersetzung","tur":"isim","tr":"tartışma / yüzleşme","s":"Die **Auseinandersetzung** mit dem Chef war laut.","t":"Patronla tartışma gürültülüydü.","i":"auseinander=ayrı ayrı","e":"'aus' + 'einander' + 'setzen'. Kelimenin tam anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":132,"k":"Günlük rutinler","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiyor.","i":"entwickeln=geliştirmek","e":"'ent-' (çıkarma) + 'Wicklung' (sarma, 'wickeln'den). 'Wickeln' Orta Almanca 'wickeln': sarmak, dolamak. Gelişim = sarılı olanı açmak."},{"id":133,"k":"Günlük rutinler","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t" :"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":169,"k":"Saatler günler ve tarihler","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":170,"k":"Saatler günler ve tarihler","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":171,"k":"Saatler günler ve tarihler","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":172,"k":"Saatler günler ve tarihler","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":173,"k":"Saatler günler ve tarihler","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":174,"k":"Saatler günler ve tarihler","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":175,"k":"Saatler günler ve tarihler","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":176,"k":"Saatler günler ve tarihler","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":177,"k":"Saatler günler ve tarihler","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":178,"k":"Saatler günler ve tarihler","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":179,"k":"Saatler günler ve tarihler","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":180,"k":"Saatler günler ve tarihler" metmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":292,"k":"Restoran ve kafe","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":293,"k":"Restoran ve kafe","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":294,"k":"Restoran ve kafe","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":295,"k":"Restoran ve kafe","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":296,"k":"Restoran ve kafe","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":297,"k":"Restoran ve kafe","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},  (Eski Almanca '-unga'). Temel fiil: 'Vorsorgeuntersuchen' → eylem → sonuç olarak koruyucu muayene."},{"id":333,"k":"Doktor ve hastane","de":"die Diagnose","tur":"isim","tr":"teşhis","s":"Die **Diagnose** des Arztes war eindeutig.","t":"Doktorun teşhisi netti.","i":"Yunan: diagnosis=ayrıştırma","e":"Yunanca 'diagnosis' (dia=aracılığıyla + gnosis=bilgi). 'Bilgi yoluyla ayırt etmek' → teşhis."},{"id":334,"k":"Doktor ve hastane","de":"die Behandlungsmethode","tur":"isim","tr":"tedavi yöntemi","s":"**die Behandlungsmethode** spielt eine wichtige Rolle in unserem Alltag.","t":"die Behandlungsmethode günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | tedavi yöntemi","e":"Almanca kökenli kelime. 'Behandlungsmethode' → tedavi yöntemi. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":335,"k":"Doktor ve hastane","de":"die Krankenakte","tur":"isim","tr":"hasta dosyası","s":"**die Krankenakte** spielt eine wichtige Rolle in unserem Alltag.","t":"die Krankenakte günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | hasta dosyası","e":"Almanca kökenli kelime. 'Krankenakte' → hasta dosyası. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":336,"k":"Doktor ve hastane","de":"die Nachsorge","tur":"isim","tr":"tedavi sonrası takip","s":"**die Nachsorge** spielt eine wichtige Rolle in unserem Alltag.","t":"die Nachsorge günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | tedavi sonrası takip","e":"Almanca kökenli kelime. 'Nachsorge' → tedavi sonrası takip. Eski Almanca veya Orta Yüksek Almancadan günümüze ulaşmıştır."},{"id":337,"k":"Doktor ve hastane","de":"untersuchen","tur":"fiil","tr":"muayene etmek","s":"Der Arzt **untersucht** den Patienten gründlich.","t":"Doktor hastayı iyice muayene etti.","i":"unter+suchen=altını aramak","e":"'unter' (altında) + 'suchen' (aramak). 'Altına bakarak aramak' → muayene etmek, incelemek."},{"id":338,"k":"Doktor ve hastane","de":"verschreiben","tur":"fiil","tr":"reçete etmek","s":"Es ist s armak, dolamak. Gelişim = sarılı olanı açmak."},{"id":373,"k":"Ulaşım ve trafik","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t":"Dakiklik önemli bir ön koşuldur.","i":"voraus=önce + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":374,"k":"Ulaşım ve trafik","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":375,"k":"Ulaşım ve trafik","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":376,"k":"Ulaşım ve trafik","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":377,"k":"Ulaşım ve trafik","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":378,"k":"Ulaşım ve trafik","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":379,"k":"Ulaşım ve trafik","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":380,"k":"Ulaşım ve trafik","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":381,"k":"Ulaşım ve trafik","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":382,"k":"Ulaşım ve trafik","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":383,"k":"Ulaşım ve trafik","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":384,"k":"Ulaşım ve trafik","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":385,"k":"Ulaşım ve trafik","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":386,"k":"Ulaşım ve trafik","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":387,"k":"Ulaşım ve trafik","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":388,"k":"Ulaşım ve trafik","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":389,"k":"Ulaşım ve trafik","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":390,"k":"Ulaşım ve trafik","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":391,"k":"Araba "beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":415,"k":"Araba kullanma","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":416,"k":"Araba kullanma","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":417,"k":"Araba kullanma","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":418,"k":"Araba kullanma","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":419,"k":"Araba kullanma","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":420,"k":"Araba kullanma","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mi rke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":497,"k":"Hava durumu","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":498,"k":"Hava durumu","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":499,"k":"Hava durumu","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":500,"k":"Hava durumu","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":501,"k":"Hava durumu","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":502,"k":"Hava durumu","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":503,"k":"Hava durumu","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":504,"k":"Hava durumu","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":505,"k":"Hava durumu","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":506,"k":"Hava durumu","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":507,"k":"Hava durumu","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":508,"k":"Hava durumu","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":509,"k":"Hava durumu","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":510,"k":"Hava durumu","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":511,"k":"Hobiler ve boş zaman","de":"die Freizeitgestaltung","tur":"isim","tr":"boş zamanı değerlendirme","s":"**die Freizeitgestaltung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Freizeitgestaltung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | boş zamanı değerlendirme","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Freizeitgestalten' → eylem → sonuç olarak boş zamanı değerlendirme."},{"id":512,"k":"Hobiler ve boş zaman","de":"die Leidenschaft","tur":"isim","tr":"tutku","s":"**die Leidenschaft** spielt eine wichtige Rolle in unserem Alltag.","t":"die Leidenschaft günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | tutku","e":"'-schaft' soneki (Eski Almanca '-scaft': durum, oluşum) kolektif isim türetir → tutku topluluğu/durumu."},{"id":513,"k":"Hobiler ve boş zaman","de":"die Abwechslung","tur":"isim","tr":"çeşitlilik","s":"**die Abwechslung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Abwechslung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | çeşitlilik","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Abwechslen' → eylem → sonuç olarak çeşitlilik."},{"id":514,"k":"Hobiler ve boş zaman","de":"die Entspa v.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":619,"k":"Müzik","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":620,"k":"Müzik","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":621,"k":"Müzik","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":622,"k":"Müzik","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":623,"k":"Müzik","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":624,"k":"Müzik","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":625,"k":"Müzik","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":626,"k":"Müzik","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":627,"k":"Müzik","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":628,"k":"Müzik","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":629,"k":"Müzik","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":630,"k":"Müzik","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":631,"k":"İnternet ve teknoloji","de":"die Dat ","tur":"fiil","tr":"anlayabilmek","s":"Ich kann deine Entscheidung **nachvollziehen**.","t":"Kararını anlayabiliyorum.","i":"nach+vollziehen=takip et","e":"'nach' (sonra, takip) + 'vollziehen' (tamamlamak). 'Birisinin adımlarını tam olarak takip etmek' → anlamak."},{"id":660,"k":"İnternet ve teknoloji","de":"sich auseinandersetzen mit","tur":"fiil","tr":"bir konuyla yüzleşmek","s":"Sie setzt sich mit dem Problem **auseinander**.","t":"Problemle yüzleşiyor.","i":"auseinander → yüzleşmek","e":"'auseinander' (birbirinden) + 'setzen'. 'Parçaları birbirinden ayırıp incelemek' → bir konuyla yüzleşmek."},{"id":661,"k":"Telefon görüşmeleri","de":"die Erreichbarkeit","tur":"isim","tr":"ulaşılabilirlik","s":"**die Erreichbarkeit** spielt eine wichtige Rolle in unserem Alltag.","t":"die Erreichbarkeit günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | ulaşılabilirlik","e":"'-keit' soneki ('-heit'in varyantı) sıfatlardan soyut isim türetir → ulaşılabilirlik niteliği."},{"id":662,"k":"Telefon görüşmeleri","de":"die Rückmeldung","tur":"isim","tr":"geri dönüş","s":"**die Rückmeldung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Rückmeldung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | geri dönüş","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Rückmelden' → eylem → sonuç olarak geri dönüş."},{"id":663,"k":"Telefon görüşmeleri","de":"die Weiterleitung","tur":"isim","tr":"yönlendirme","s":"**die Weiterleitung** spielt eine wichtige Rolle in unserem Alltag.","t":"die Weiterleitung günlük hayatımızda önemli rol oynar.","i":"→ die (dişil) | yönlendirme","e":"'-ung' soneki fiilden isim türetir (Eski Almanca '-unga'). Temel fiil: 'Weiterleiten' → eylem → sonuç olarak yönlendirme."},{"id":664,"k":"Telefon görüşmeleri","de":"die Gesprächsnotiz","tur":"isim","tr":"görüşme notu","s":"**die Gesprächsnotiz** spielt eine wichtige Rolle in unserem Alltag.","t":"die Gesprächsnotiz günlük hayatımızda önemli rol oynar.","i":"→ die (dişi ,"k":"Sosyal medya","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":706,"k":"Sosyal medya","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":707,"k":"Sosyal medya","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":708,"k":"Sosyal medya","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":709,"k":"Sosyal medya","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":710,"k":"Sosyal medya","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → "id":821,"k":"Para ve bütçe","de":"die Auseinandersetzung","tur":"isim","tr":"tartışma / yüzleşme","s":"Die **Auseinandersetzung** mit dem Chef war laut.","t":"Patronla tartışma gürültülüydü.","i":"auseinander=ayrı ayrı","e":"'aus' + 'einander' + 'setzen'. Kelimenin tam anlamı: 'birbirinden ayırarak koymak' → tartışarak netleştirmek."},{"id":822,"k":"Para ve bütçe","de":"die Entwicklung","tur":"isim","tr":"gelişim","s":"Die **Entwicklung** des Kindes verläuft sehr gut.","t":"Çocuğun gelişimi çok iyi gidiyor.","i":"entwickeln=geliştirmek","e":"'ent-' (çıkarma) + 'Wicklung' (sarma, 'wickeln'den). 'Wickeln' Orta Almanca 'wickeln': sarmak, dolamak. Gelişim = sarılı olanı açmak."},{"id":823,"k":"Para ve bütçe","de":"die Voraussetzung","tur":"isim","tr":"ön koşul","s":"Pünktlichkeit ist eine wichtige **Voraussetzung**.","t":"Dakiklik önemli bir ön koşuldur.","i":"voraus=önce + setzen=koymak","e":"'vor' (önce) + 'aus' (dışarı) + 'setzen' (koymak). 'Önceden dışarıya konulan şart' → ön koşul."},{"id":824,"k":"Para ve bütçe","de":"die Herausforderung","tur":"isim","tr":"zorluk","s":"Sprachen lernen ist eine große **Herausforderung**.","t":"Dil öğrenmek büyük bir zorluk.","i":"herausfordern=meydan okumak","e":"'heraus' (dışarıya) + 'fordern' (istemek, Latince 'fordare'). 'Dışarıya çağırmak' → meydan okumak → zorluk."},{"id":825,"k":"Para ve bütçe","de":"die Verantwortung","tur":"isim","tr":"sorumluluk","s":"Jeder trägt **Verantwortung** für sein Handeln.","t":"Herkes eylemlerinden sorumludur.","i":"Antwort=cevap → sorumluluk","e":"'ver-' + 'Antwort' (cevap) + '-ung'. 'Antwort' Eski Almanca 'antwurti': karşı söz. Sorumlu olmak = cevap vermek zorunda olmak."},{"id":826,"k":"Para ve bütçe","de":"die Auswirkung","tur":"isim","tr":"etki / sonuç","s":"Stress hat starke **Auswirkungen** auf die Gesundheit.","t":"Stresin sağlık üzerinde güçlü etkileri var.","i":"aus+wirken=etki etmek","e":"'aus' (dışarı) + 'wirken' (etki etmek, Eski Almanca 'wircan') + '-ung'. 'Wirken' Latince 'urgere'yle akraba: itmek, zorlamak."},{"id":827,"k":"Para ve bütçe","de":"die Maßnahme","tur":"isim","tr":"önlem / tedbir","s":"Die Regierung ergreift **Maßnahmen** gegen die Krise.","t":"Hükümet kriz için önlemler alıyor.","i":"Maß=ölçü + nehmen=almak","e":"'Maß' (ölçü, Eski Almanca 'maz') + 'Nahme' (alma). 'Ölçülü adım atmak' → önlem. 'Maß' Latince 'mensura'yla köken ortaklığı var."},{"id":828,"k":"Para ve bütçe","de":"die Einschätzung","tur":"isim","tr":"değerlendirme","s":"Meine **Einschätzung** der Lage ist positiv.","t":"Duruma ilişkin değerlendirmem olumlu.","i":"einschätzen=değerlendirmek","e":"'ein' (içine) + 'schätzen' (değer biçmek) + '-ung'. Latince 'aestimare' (değer biçmek) ile anlam paralelliği."},{"id":829,"k":"Para ve bütçe","de":"die Umsetzung","tur":"isim","tr":"uygulama","s":"Die **Umsetzung** des Plans dauert drei Monate.","t":"Planın uygulanması üç ay sürer.","i":"umsetzen=uygulamaya koymak","e":"'um' (etrafında, başka yere) + 'setzen' (koymak) + '-ung'. 'Başka bir yere koymak' → uygulamaya aktarmak."},{"id":830,"k":"Para ve bütçe","de":"die Grundlage","tur":"isim","tr":"temel dayanak","s":"Vertrauen ist die **Grundlage** jeder Freundschaft.","t":"Güven her dostluğun temelidir.","i":"Grund=temel + legen=koymak","e":"'Grund' (temel, Eski Almanca 'grunt': derin yer, dip) + 'Lage' (konum). 'Dibine konan şey' → temel dayanak."},{"id":831,"k":"Para ve bütçe","de":"bewältigen","tur":"fiil","tr":"üstesinden gelmek","s":"Sie hat die Krise alleine **bewältigt**.","t":"Krizi tek başına atlattı.","i":"wälzen → üstesinden gelmek","e":"'be-' + 'Gewalt' (güç, kuvvet, Eski Almanca 'waltan': hükmetmek). 'Üzerine güç uygulamak' → üstesinden gelmek."},{"id":832,"k":"Para ve bütçe","de":"berücksichtigen","tur":"fiil","tr":"dikkate almak","s":"Bitte **berücksichtigen** Sie alle Faktoren.","t":"Lütfen tüm faktörleri dikkate alın.","i":"Rücksicht → dikkate almak","e":"'be-' + 'Rücksicht' (geriye bakış) + '-igen'. 'Arkasına bakmak' → göz önünde bulundurmak → dikkate almak."},{"id":833,"k":"Para ve bütçe","de":"gewährleisten","tur":"fiil","tr":"garanti altına almak","s":"Der Vertrag **gewährleistet** Ihre Rechte.","t":"Sözleşme haklarınızı güvence altına alır.","i":"Gewähr=garanti","e":"'Gewähr' (garanti, Eski Yüksek Almanca 'wâra': güven, sadakat) + 'leisten' (yapmak). 'Güveni yerine getirmek'."},{"id":834,"k":"Para ve bütçe","de":"beeinträchtigen","tur":"fiil","tr":"olumsuz etkilemek","s":"Lärm **beeinträchtigt** die Konzentration.","t":"Gürültü konsantrasyonu bozar.","i":"ein+trächtigen → zarar vermek","e":"'be-' + 'ein-' + 'trächtigen'. 'Trächtig' Eski Almanca 'drehtig': yüklü, hamile. 'İçine yük bindirmek' → zarar vermek."},{"id":835,"k":"Para ve bütçe","de":"fördern","tur":"fiil","tr":"desteklemek","s":"Die Stadt **fördert** junge Künstler.","t":"Şehir genç sanatçıları destekliyor.","i":"Förderung=destek/teşvik","e":"Eski Almanca 'furthiren' (ilerletmek). 'furdir' = daha ileri. Latince 'promovere' ile anlam eşdeğeri: öne itmek."},{"id":836,"k":"Para ve bütçe","de":"vermeiden","tur":"fiil","tr":"kaçınmak / önlemek","s":"Ich versuche Konflikte zu **vermeiden**.","t":"Çatışmalardan kaçınmaya çalışıyorum.","i":"meiden=kaçınmak","e":"'ver-' + 'meiden' (kaçınmak, Eski Almanca 'mîdan'). Gotça 'maidan': değiştirmek, uzak durmak."},{"id":837,"k":"Para ve bütçe","de":"einschätzen","tur":"fiil","tr":"değerlendirmek","s":"Kannst du die Lage richtig **einschätzen**?","t":"Durumu doğru değerlendirebilir misin?","i":"ein+schätzen → tahmin","e":"'ein' (içine) + 'schätzen'. Orta Yüksek Almanca 'schetzen': hazine değeri koymak. 'İçine bakıp değer biçmek'."},{"id":838,"k":"Para ve bütçe","de":"umsetzen","tur":"fiil","tr":"uygulamaya geçirmek","s":"Wir müssen den Plan sofort **umsetzen**.","t":"Planı hemen uygulamaya koymalıyız.","i":"um+setzen → uygulamak","e":"'um' + 'setzen'. Eski Almanca 'setzen': bir yere yerleştirmek. 'Başka bir forma taşımak' → uygulamak."},{"id":839,"k":"Para ve bütçe","de":"nachvollziehen","tur":"fiil","tr":"anlayabilmek",
